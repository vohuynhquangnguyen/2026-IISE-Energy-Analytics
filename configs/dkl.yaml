  # Noise injection on outage-lag columns during training
  # (improves autoregressive robustness at test time)
  lag_noise_frac: 0.3
  lag_noise_scale: 0.15

  # Early stopping patience (epochs without validation improvement)
  early_stopping_patience: 10

# ---------------------------------------------------------------------------
# Prediction intervals
# ---------------------------------------------------------------------------
intervals:
  # Method: "conformal" uses held-out residual calibration;
  #         "posterior" uses the GP posterior variance directly.
  method: conformal

  # Significance level (0.05 → 95% PI)
  alpha: 0.05

  # Number of trailing timestamps used for conformal calibration
  calibration_size: 48

  # Per-horizon normalized conformal settings (improvements 1+2+3)
  # These control the PerHorizonConformal pipeline which combines:
  #   1. Normalized conformal (GP std as score normalizer)
  #   2. Log-space calibration (expm1 back-transform)
  #   3. Per-horizon ACI (adaptive alpha per step-ahead)
  per_horizon_window: 300      # Rolling window size for residual pools
  aci_learning_rate: 0.005     # ACI step size (higher = more adaptive)
