# ============================================================================
# Seq2Seq (LSTM Encoder–Decoder) Configuration
# ============================================================================
# This file controls the architecture and training hyperparameters for the
# Seq2Seq model. The model uses an LSTM encoder to summarise the look-back
# window and a linear head to project the forecast horizon.
#
# Features: [scaled_outage, scaled_weather_features]  (built per-location)
# Reference: demo.ipynb — Cells 23-26
# ============================================================================

model:
  # --- Architecture ---
  # Number of past hourly time steps fed to the LSTM encoder
  seq_len: 24

  # Number of future hourly time steps the model must predict
  horizon: 48

  # LSTM hidden dimension — larger values increase capacity but slow training
  hidden_dim: 64

  # Number of stacked LSTM layers
  num_layers: 1

  # Whether to clip predictions to be non-negative
  clip_nonnegative: true

training:
  # Mini-batch size for stochastic gradient descent
  batch_size: 64

  # Total training epochs
  epochs: 100

  # Adam optimiser learning rate
  lr: 1.0e-3

  # Max gradient norm for gradient clipping (stabilises LSTM training)
  grad_clip_norm: 5.0

# --- Conformal calibration for prediction intervals ---
# We hold out the last `cal_size` timestamps from the training set, train a
# calibration model on the remainder, and use the absolute residuals on the
# held-out block to compute county-specific interval half-widths.
intervals:
  # Number of trailing timestamps reserved for calibration
  cal_size: 48

  # Quantile level for the conformal interval (0.95 → 95% coverage target)
  q_level: 0.95
